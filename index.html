<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura Ferri Pereira</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: #ffffff;
            color: #333;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        #webcam-container canvas {
            border-radius: 15px;
            margin-top: 15px;
            border: 4px solid #0d6efd;
        }

        .btn-camera {
            background: linear-gradient(45deg, #0d6efd, #6610f2);
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-camera:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .progress {
            height: 25px;
            border-radius: 20px;
            background-color: #e9ecef;
        }

        .progress-bar {
            font-weight: bold;
        }

        .label-text {
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-custom mx-auto col-lg-6 col-md-8 col-12">
        <h2 class="mb-3">🤖 Classificador de Imagens</h2>
        <p class="text-muted">Clique no botão para ativar a câmera</p>

        <button class="btn-camera mb-3" onclick="init()">
            📷 Permitir acesso à câmera
        </button>

        <div id="webcam-container" class="d-flex justify-content-center"></div>

        <div id="label-container" class="mt-4"></div>
    </div>
</div>

<!-- TensorFlow e Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/VfNMVg5i1/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(250, 250, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("mb-3");

            const label = document.createElement("div");
            label.classList.add("label-text");

            const progress = document.createElement("div");
            progress.classList.add("progress");

            const progressBar = document.createElement("div");
            progressBar.classList.add("progress-bar", "bg-primary");
            progressBar.style.width = "0%";
            progressBar.innerText = "0%";

            progress.appendChild(progressBar);
            wrapper.appendChild(label);
            wrapper.appendChild(progress);

            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const probability = (prediction[i].probability * 100).toFixed(1);
            const className = prediction[i].className;

            const wrapper = labelContainer.childNodes[i];
            const label = wrapper.childNodes[0];
            const progressBar = wrapper.childNodes[1].childNodes[0];

            label.innerHTML = className + " (" + probability + "%)";
            progressBar.style.width = probability + "%";
            progressBar.innerText = probability + "%";
        }
    }
</script>

</body>
</html>
